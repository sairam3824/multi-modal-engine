version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - qdrant
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000

  demo:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: streamlit run src/demo.py --server.port 8501 --server.address 0.0.0.0

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
